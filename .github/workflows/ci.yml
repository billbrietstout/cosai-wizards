name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  html-validate:
    name: html-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install html-validate
        run: npm install --no-save html-validate@9
      - name: Validate HTML
        run: |
          npx html-validate \
            "index.html" \
            "wizards/*/index.html"

  link-check:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,204,206,301,302,403,429
            --exclude-path wizards-raw
            --exclude-path shared/vendor
            "**/*.html"
            "**/*.md"
          fail: true

  pa11y:
    name: pa11y accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pa11y + http-server
        run: npm install --no-save pa11y@8 http-server@14
      - name: Serve site
        run: |
          npx http-server . -p 8080 -s &
          sleep 3
      - name: Run pa11y (WCAG2AA)
        run: |
          set -e
          for url in \
            http://localhost:8080/ \
            http://localhost:8080/wizards/security-controls/ \
            http://localhost:8080/wizards/controls-assessment/ \
            http://localhost:8080/wizards/layer-matrix/ \
            http://localhost:8080/wizards/srf-stress/ \
            http://localhost:8080/wizards/policy-pyramid/; do
            echo "::group::pa11y $url"
            npx pa11y --config .pa11yci.json "$url"
            echo "::endgroup::"
          done

  lighthouse:
    name: lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install lhci + http-server
        run: npm install --no-save @lhci/cli@0.14 http-server@14
      - name: Serve site
        run: |
          npx http-server . -p 8080 -s &
          sleep 3
      - name: Run Lighthouse CI
        continue-on-error: true
        run: |
          npx lhci collect \
            --url=http://localhost:8080/ \
            --url=http://localhost:8080/wizards/security-controls/ \
            --url=http://localhost:8080/wizards/controls-assessment/ \
            --url=http://localhost:8080/wizards/layer-matrix/ \
            --url=http://localhost:8080/wizards/srf-stress/ \
            --url=http://localhost:8080/wizards/policy-pyramid/ \
            --numberOfRuns=1 \
            --settings.chromeFlags="--no-sandbox --disable-dev-shm-usage"
          npx lhci upload --target=temporary-public-storage
      - name: Upload Lighthouse report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore
